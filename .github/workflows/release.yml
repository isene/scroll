name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: scroll-linux-x86_64
          # aarch64-unknown-linux-gnu is dropped: rquest pulls in
          # BoringSSL via boring-sys2, whose build script invokes the
          # *host* C compiler regardless of the cargo target — the
          # resulting x86_64 .o files fail to link into an aarch64
          # binary (`Relocations in generic ELF (EM: 62)`). Re-enable
          # once boring-sys2 honours `CC_aarch64_unknown_linux_gnu` or
          # we move TLS impersonation into a sub-binary.
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: scroll-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: scroll-macos-aarch64

    steps:
      - uses: actions/checkout@v4
        with:
          path: scroll

      - name: Checkout crust
        uses: actions/checkout@v4
        with:
          repository: isene/crust
          path: crust

      - name: Checkout glow
        uses: actions/checkout@v4
        with:
          repository: isene/glow
          path: glow

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: scroll
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        working-directory: scroll
        run: |
          cp target/${{ matrix.target }}/release/scroll ../${{ matrix.artifact }}
          chmod +x ../${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
          generate_release_notes: true
          body: |
            ## Installation

            Download the binary for your platform:
            ```bash
            chmod +x scroll-*
            ./scroll-linux-x86_64    # or your platform
            ```

            Optionally copy to your PATH:
            ```bash
            sudo cp scroll-linux-x86_64 /usr/local/bin/scroll
            ```

            ## Platforms
            - `scroll-linux-x86_64` - Linux (Intel/AMD 64-bit)
            - `scroll-macos-x86_64` - macOS (Intel)
            - `scroll-macos-aarch64` - macOS (Apple Silicon)
