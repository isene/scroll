<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f74c00"/>
      <stop offset="100%" style="stop-color:#b7410e"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes scan { 0% { transform: translateY(-40px); opacity: 0; } 40% { opacity: 0.5; } 60% { opacity: 0.5; } 100% { transform: translateY(40px); opacity: 0; } }
    @keyframes cursor-blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    .scan { animation: scan 3s ease-in-out infinite; }
    .cursor { animation: cursor-blink 1.2s step-end infinite; }
  </style>
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="url(#rust)" stroke-width="3"/>
  <!-- Globe web lines -->
  <circle cx="128" cy="110" r="55" fill="none" stroke="#51afef" stroke-width="0.6" opacity="0.25"/>
  <ellipse cx="128" cy="110" rx="28" ry="55" fill="none" stroke="#51afef" stroke-width="0.6" opacity="0.25"/>
  <line x1="73" y1="110" x2="183" y2="110" stroke="#51afef" stroke-width="0.5" opacity="0.25"/>
  <!-- Terminal browser window -->
  <rect x="52" y="55" width="152" height="100" rx="5" fill="#0d0d0d" stroke="#f74c00" stroke-width="1.5"/>
  <!-- URL bar -->
  <rect x="58" y="61" width="140" height="10" rx="2" fill="#1a1a2e"/>
  <text x="62" y="69" font-family="monospace" font-size="6" fill="#51afef">https://</text>
  <rect class="cursor" x="96" y="62" width="4" height="8" fill="#f74c00" opacity="0.7"/>
  <!-- Content -->
  <rect x="58" y="78" width="70" height="5" rx="1" fill="#f74c00" opacity="0.7"/>
  <rect x="58" y="88" width="130" height="3" rx="1" fill="#aab" opacity="0.4"/>
  <rect x="58" y="94" width="110" height="3" rx="1" fill="#aab" opacity="0.4"/>
  <rect x="58" y="100" width="120" height="3" rx="1" fill="#aab" opacity="0.4"/>
  <!-- Links -->
  <rect x="58" y="110" width="35" height="3" rx="1" fill="#51afef" opacity="0.6"/>
  <rect x="100" y="110" width="45" height="3" rx="1" fill="#51afef" opacity="0.6"/>
  <!-- Image placeholder -->
  <rect x="58" y="120" width="35" height="25" rx="2" fill="#1a1a2e" stroke="#f74c00" stroke-width="0.5"/>
  <polygon points="63,140 72,130 78,136 87,127 90,140" fill="#4c4" opacity="0.4"/>
  <!-- Scan line -->
  <rect class="scan" x="52" y="110" width="152" height="1" fill="#f74c00" opacity="0.15"/>
  <text x="128" y="198" font-family="monospace" font-size="20" font-weight="bold" fill="url(#rust)" text-anchor="middle" letter-spacing="2">scroll</text>
  <text x="128" y="216" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">terminal web browser</text>
</svg>
